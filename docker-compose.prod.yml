version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mlmdb}
      POSTGRES_USER: ${POSTGRES_USER:-mlmuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlmuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  backend:
    image: ${REGISTRY:-ghcr.io}/earnchain/backend:${TAG:-latest}
    build:
      context: ./backend
    restart: always
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    env_file:
      - ./backend/config/.env
    environment:
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 mlm_project.asgi:application"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  celery:
    image: ${REGISTRY:-ghcr.io}/earnchain/backend:${TAG:-latest}
    restart: always
    env_file:
      - ./backend/config/.env
    environment:
      - DEBUG=False
    depends_on:
      - backend
      - redis
    command: celery -A mlm_project worker -l warning --concurrency=4

  celery-beat:
    image: ${REGISTRY:-ghcr.io}/earnchain/backend:${TAG:-latest}
    restart: always
    env_file:
      - ./backend/config/.env
    environment:
      - DEBUG=False
    depends_on:
      - backend
      - redis
    command: celery -A mlm_project beat -l warning --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    image: ${REGISTRY:-ghcr.io}/earnchain/frontend:${TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - static_files:/var/www/static
      - media_files:/var/www/media
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot --email ${ADMIN_EMAIL} -d ${DOMAIN} --agree-tos --non-interactive

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  certbot_certs:
  certbot_www:
