<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>
  
  <!-- Candlestick chart — green candles = bullish finance theme -->
  
  <!-- Candle 1 (left) — bearish red -->
  <line x1="7" y1="6" x2="7" y2="10" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="4.5" y="10" width="5" height="7" rx="0.5" fill="#ef4444"/>
  <line x1="7" y1="17" x2="7" y2="21" stroke="#ef4444" stroke-width="1.5"/>

  <!-- Candle 2 (middle) — bullish green -->
  <line x1="16" y1="5" x2="16" y2="9" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="13.5" y="9" width="5" height="9" rx="0.5" fill="#22c55e"/>
  <line x1="16" y1="18" x2="16" y2="23" stroke="#22c55e" stroke-width="1.5"/>

  <!-- Candle 3 (right) — bullish green -->
  <line x1="25" y1="7" x2="25" y2="11" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="22.5" y="11" width="5" height="8" rx="0.5" fill="#22c55e"/>
  <line x1="25" y1="19" x2="25" y2="24" stroke="#22c55e" stroke-width="1.5"/>

  <!-- Trend line -->
  <polyline points="7,14 16,11 25,9" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2,1" opacity="0.7"/>
  
  <!-- Dollar sign subtle watermark -->
  <text x="16" y="31" font-family="monospace" font-size="5" fill="#22c55e" opacity="0.5" text-anchor="middle">ST</text>
</svg>